## train c3vd_v2
## trainer
log_dir: results_shvit_edfm_v2
run_train: true
num_epochs: 30
batch_size: 16
save_checkpoint_freq: 1
log_freq: 100
run_val: true
run_test: true
metric_str_exclude: ["loss/photometric_1", "loss/photometric_2", "loss/photometric_3", "de/abs_rel", "de/sq_rel", "de/rms", "da/a2", "da/a3"]

## checkpoints
weights_init: pretrained # choices=["pretrained", "scratch"]
mypretrain: "/media/mems509/9b308a11-7150-4494-8f42-71df9385ff43/home/mems509/wjy/MonoLoT-main/SwiftFormer_S_ckpt.pth"

## resume
#models_to_load: ["net_depth_encoder", "net_depth_decoder", "net_depth_intrinsics", "net_pose_encoder", "net_pose_decoder"]
#start_epoch: 13
#load_weights_folder: /media/mems509/9b308a11-7150-4494-8f42-71df9385ff43/home/mems509/hz/MonoLoT-main/newresults2/RCC_matching_cropalign_depthnet_c3vd_v2_monodepth2/models/weights_12

## optimizer
lr: [0.0001, 0.00001, 26, 0.0001, 0.00001, 26]

## loss
disable_matcher: false
disparity_smoothness: 0.001
matcher_loss_alpha: 1.
confidence: 0.9
matcher_loss_delta: 4
ratio_consistency: true
#ratio_consistency_crop: true
#align_crop_position: true

## dataloader
data_path: /media/mems509/9b308a11-7150-4494-8f42-71df9385ff43/home/mems509/wjy/MonoLoT-main/data/c3vd_v2/imgs
split: c3vd_v2 # choices=["eigen_zhou", "eigen_full", "odom", "benchmark", "yifanwang", "yifanwang_cutoff1", "my_kitti", "simcol", "c3vd"]
dataset: C3VDDataset # choices=["kitti", "kitticorres", "kitti_odom", "kitti_depth", "kitti_test", "yifanwang", "my_kitti", "simcol", "simcolcorres", "c3vd", "c3vdcorres"]
png: true
height: 256
width: 320
matcher_result_train: data/c3vd_v2/matcher_results/train.npy
matcher_result_val: data/c3vd_v2/matcher_results/val.npy
matcher_result_test: data/c3vd_v2/matcher_results/test.npy
load_depth: true

## model
model_name: RCC_matching_cropalign_depthnet_c3vd_v2_monodepth2
model: EstimateDepth
model_str: monodepth2 # choices=["lite-mono", "lite-mono-small", "lite-mono-tiny", "lite-mono-8m", "monodepth2"]
weight_decay: 0.01
drop_path: 0.2
num_layers: 18 # choices=[18, 34, 50, 101, 152]
scales: [0,1,2,3]
min_depth: 0.1
max_depth: 100.0
frame_ids: [0,-1,1]
min_gt_depth: 0.001
max_gt_depth: 1.0